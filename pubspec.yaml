name: silkfps
description: "Silk smooth FPS boost for Flutter. Auto-detects Vulkan/Skia on Android and Metal/ProMotion on iOS with real-time FPS monitoring, battery saver, and live FPS overlay."
version: 0.0.1
homepage: https://github.com/muhammadhammad7/silkfps
repository: https://github.com/muhammadhammad7/silkfps
issue_tracker: https://github.com/muhammadhammad7/silkfps/issues

topics:
  - fps
  - refresh-rate
  - performance
  - vulkan
  - display

environment:
  sdk: '>=3.11.1 <4.0.0'
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.silkfps.silkfps
        pluginClass: SilkfpsPlugin
      ios:
        pluginClass: SilkfpsPlugin